name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DEPLOY_HOST: research-vpn.homeofcode.com
  DEPLOY_USER: gitideas

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --features client

      - name: Run tests
        run: cargo test

      - name: Upload release binaries
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: gitideas-binaries
          path: |
            target/release/gitideas
            target/release/gitideas-client

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: gitideas-binaries
          path: dist

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          # Find binaries (artifact may preserve target/release/ prefix)
          find dist -type f -name 'gitideas*' | head -10
          GITIDEAS=$(find dist -type f -name 'gitideas' | head -1)
          GITIDEAS_CLIENT=$(find dist -type f -name 'gitideas-client' | head -1)
          chmod +x "$GITIDEAS" "$GITIDEAS_CLIENT"

          # Copy binaries to server
          scp $SSH_OPTS "$GITIDEAS" "$GITIDEAS_CLIENT" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"

          # Install and restart service
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" 'sudo /usr/bin/mv /tmp/gitideas /usr/local/bin/gitideas && sudo /usr/bin/mv /tmp/gitideas-client /usr/local/bin/gitideas-client && sudo /usr/bin/chmod +x /usr/local/bin/gitideas /usr/local/bin/gitideas-client && sudo /usr/bin/systemctl restart gitideas'
